global:
  scrape_interval: 15s

scrape_configs:

  - job_name: prometheus

    static_configs:
      - targets:
          - prometheus:9090

        labels:
          hostname: sv-app-01
          role: monitoring
          environment: production
          location: oficina-central

  - job_name: linux

    static_configs:
      - targets:
          - node-exporter:9100

        labels:
          hostname: sv-app-01
          role: monitoring
          environment: production
          location: oficina-central
